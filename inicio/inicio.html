<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARMITEX</title>
    <link rel="stylesheet" href="/inicio/inicio.style.css">
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="topo-preto"></div>
    <img src="/img/marmitex_branco.png" alt="Logo Marmitex" class="img_pizza">

    <div class="area-pesquisa">
        <div class="barra-pesquisa">
            <span class="icone-lupa">&#128269;</span>
            <input type="text" placeholder="Onde voce deseja receber sua Marmitex?">
        </div>
    </div>

    <nav class="menu-categorias">
        <a href="/inicio/inicio.html" class="item-menu ativo">
            <span>Todos</span>
        </a>
        <a href="/doces/doces.html" class="item-menu">
            <span>Doces</span>
        </a>
        <a href="/marmitas/marmitas.html" class="item-menu">
            <span>Marmitas</span>
        </a>
    </nav>

    <div class="grade-imagens">
        <div class="item-imagem">
            <img src="/img/marmita_inicio.jpg" alt="Imagem 1">
            <div class="badge-desconto">
                <span class="badge-porcentagem">25%</span>
                <span class="badge-off">Off</span>
            </div>
        </div>
        <div class="item-imagem">
            <img src="/img/marmita2_inicio.jpg" alt="Imagem 2">
            <div class="badge-desconto">
                <span class="badge-porcentagem">10%</span>
                <span class="badge-off">Off</span>
            </div>
        </div>
        <div class="item-imagem">
            <img src="/img/marmita3_inicio.jpg" alt="Imagem 3">
            <div class="badge-desconto">
                <span class="badge-porcentagem">20%</span>
                <span class="badge-off">Off</span>
            </div>
        </div>
    </div>

    <div class="btn-ver-mais">
        <button type="button" class="botao-ver-mais" onclick="window.location.href='/marmitas/marmitas.html'">Ver Mais &gt;</button>
    </div>

    <div class="banner-promocao">
        <div class="banner-promocao__texto">
            <p class="banner-promocao__frase">
                <span class="linha-branca">Nao e</span><br>
                <span class="linha-vermelha">PROMOCAO</span>, e<br>
                <span class="linha-amarela">TENTACAO</span>:
            </p>
            <h2 class="banner-promocao__desconto">30% OFF</h2>
        </div>
        <div class="banner-promocao__imagem">
            <img src="/img/pizza_page1.jpg" alt="Pizza em promocao">
        </div>
    </div>

    <div class="outros-texto-msg">
        <h2>Outros:</h2>
    </div>

    <div class="grade-recomendados">
        <div class="card-recomendado">
            <img src="/img/salada_inicio.jpg" alt="Salada">
            <button type="button" class="botao-recomendado" onclick="window.location.href='/marmitas/marmitas.html'">salada</button>
        </div>
        <div class="card-recomendado">
            <img src="/img/churrasco_inicio.jpg" alt="Churrasco">
            <button type="button" class="botao-recomendado" onclick="window.location.href='/marmitas/marmitas.html'">churrasco</button>
        </div>
        <div class="card-recomendado">
            <img src="/img/torta_inicio.jpg" alt="Torta">
            <button type="button" class="botao-recomendado" onclick="window.location.href='/doces/doces.html'">torta</button>
        </div>
        <div class="card-recomendado">
            <img src="/img/macarrão_inicio.jpg" alt="Macarrao">
            <button type="button" class="botao-recomendado" onclick="window.location.href='/marmitas/marmitas.html'">macarrao</button>
        </div>
    </div>

    <nav class="hotbar">
        <a href="/inicio/inicio.html" class="item-hotbar">
            <i class="fa-solid fa-house"></i>
            <span>Inicio</span>
        </a>
        <a href="/page/em-breve.html" class="item-hotbar">
            <i class="fa-solid fa-utensils"></i>
            <span>Pedidos</span>
        </a>
        <a href="/page/em-breve.html" class="item-hotbar">
            <i class="fa-solid fa-heart"></i>
            <span>Salvos</span>
        </a>
        <a href="/page/em-breve.html" class="item-hotbar">
            <i class="fa-solid fa-receipt"></i>
            <span>Realizados</span>
        </a>
        <a href="/page/em-breve.html" class="item-hotbar">
            <i class="fa-solid fa-user"></i>
            <span>Perfil</span>
        </a>
    </nav>
</body>
</html>
