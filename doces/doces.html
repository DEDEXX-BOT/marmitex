<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARMITEX</title>
    <link rel="stylesheet" href="/inicio/inicio.style.css">
    <link rel="stylesheet" href="/doces/doces.style.css">
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="topo-preto"></div>
        <img src="/img/marmitex_branco.png" alt="Logo Marmitex" class="img_pizza">

        <div class="area-pesquisa">
            <div class="barra-pesquisa">
                <span class="icone-lupa">&#128269;</span>
                <input type="text" placeholder="Onde voce deseja receber sua Marmitex?">
            </div>
        </div>

        <nav class="menu-categorias">
            <a href="/inicio/inicio.html" class="item-menu">
                <span>Todos</span>
            </a>
            <a href="/doces/doces.html" class="item-menu ativo">
                <span>Doces</span>
            </a>
            <a href="/marmitas/marmitas.html" class="item-menu">
                <span>Marmitas</span>
            </a>
        </nav>

        <div class="card">
            <img src="/img/esfira_doce.jpg" alt="Esfiras doces" class="imagem-doces">
            <div class="card-content">
                <h1>Esfiras Doces</h1>
                <p>R$ 5,00</p>
            </div>
        </div>

        <div class="card">
            <img src="/img/bombom.jpg" alt="Doces de festa" class="imagem-doces">
            <div class="card-content">
                <h1>Doces de festa 100g</h1>
                <p>R$ 8,00</p>
            </div>
        </div>

        <div class="card">
            <img src="/img/doces_fit.jpg" alt="Doces tradicionais ou diet" class="imagem-doces">
            <div class="card-content">
                <h1>Doces Tradicionais ou Diet</h1>
                <p>R$ 6,00</p>
            </div>
        </div>

        <div class="card">
            <img src="/img/bolo.jpg" alt="Tortas doces" class="imagem-doces">
            <div class="card-content">
                <h1>Tortas Doces (Fatias)</h1>
                <p>R$ 12,00</p>
            </div>
        </div>
    </div>

    <nav class="hotbar">
        <a href="/inicio/inicio.html" class="item-hotbar">
            <i class="fa-solid fa-house"></i>
            <span>Inicio</span>
        </a>
        <a href="/page/em-breve.html" class="item-hotbar">
            <i class="fa-solid fa-utensils"></i>
            <span>Pedidos</span>
        </a>
        <a href="/page/em-breve.html" class="item-hotbar">
            <i class="fa-solid fa-heart"></i>
            <span>Salvos</span>
        </a>
        <a href="/page/em-breve.html" class="item-hotbar">
            <i class="fa-solid fa-receipt"></i>
            <span>Realizados</span>
        </a>
        <a href="/page/em-breve.html" class="item-hotbar">
            <i class="fa-solid fa-user"></i>
            <span>Perfil</span>
        </a>
    </nav>
</body>
</html>
